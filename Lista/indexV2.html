<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            margin-left: 5px;
            
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
            display: flex;
            align-items: center;
        }
        li button {
            margin-left: 10px;
        } 
    </style>
</head>
<body>
    <h1>List</h1>

    <input id="textfa" type="text" placeholder="digite aqui">
    <button onclick="add()" id="btnAdd">Adicionar</button>
    
    <ul id="lista"></ul>
    
    <script>
        const input = document.getElementById("textfa");
        const botao = document.getElementById("btnAdd");
        const lista = document.getElementById("lista");

        input.addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    add();
                }
            });
        
        function add() {
            const texto = input.value;
            if (texto === ""){
                alert("digite algo");
                return;

            }
            const item = document.createElement("li");
            item.textContent = texto + " ";
            lista.appendChild(item);

            const remove = document.createElement("button");
            remove.textContent = "Remover";

            remove.addEventListener("click", function() {
                lista.removeChild(item);
            });
            item.appendChild(remove);
            input.value =  "";
            
            
        }
    </script>

</body>
</html>
