<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            margin-left: 5px;
            
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            margin: 10px 0;
            display: flex;
            align-items: center;
        }
        li button {
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>lista de Tarefas</h1>
    <input id="tarefaInput" type="text" placeholder="digite Aqui">
    <button onclick="add()" type="button">Adicionar</button>
    <ul id="tarefaList"></ul>


    <script>
        function add()
        {
          
            const tarefaInput = document.getElementById("tarefaInput");

            const tarefaList = document.getElementById("tarefaList")
        
            document.getElementById("tarefaList").innerHTML += `<li>${tarefaInput.value}</li>`;
            tarefaInput.value = "";
        
        }

    </script>
</body>
</html>
