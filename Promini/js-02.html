<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-left: 10px;
        }
        h2 {
            margin-top: 20px;
            color: #333;
        }
    </style>
    <title>Welcome</title>
</head>
<body>
    <h1>Welcome</h1>
    <input type="text" id="nomeInput" placeholder="digite seu nome">
    <button type="button" onclick="exibirSaudacao()">Exibir Saudação</button>
    <h2 id="visitante">Ola visitante</h2>

    <script>
        function exibirSaudacao() {
            const nome = document.getElementById("nomeInput").value;
            const saudacao = `Olá, ${nome}! Bem-vindo ao nosso site.`;
        document.getElementById("visitante").textContent = saudacao;}
    </script>

    
</body>
</html>
